name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build & Test
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: |
          OWNER="${{ github.repository_owner }}"
          echo "IMAGE=ghcr.io/${OWNER,,}/fastestapi-base" >> "$GITHUB_ENV"

      - name: Build base image
        run: sudo docker build --target base -t fastestapi-base .

      - name: Start Redis
        run: |
          sudo docker rm -f ci-redis > /dev/null 2>&1 || true
          sudo docker run -d --name ci-redis --network host redis:7
          sleep 2
          sudo docker exec ci-redis redis-cli ping

      - name: Build and test
        run: |
          sudo docker run --rm \
            --network host \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            fastestapi-base bash -c '
              set -e

              apt-get update && apt-get install -y --no-install-recommends curl python3

              cmake -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_TESTS=ON
              cmake --build build --parallel

              chmod +x tests/integration_test.sh
              bash tests/integration_test.sh ./build/example

              ./build/example &
              SERVER_PID=$!
              sleep 2

              test_exit=0
              ./build/tests/unit_tests --gtest_output=xml:build/test-results.xml || test_exit=$?

              kill $SERVER_PID 2>/dev/null || true
              wait $SERVER_PID 2>/dev/null || true
              rm -f fastestapi.db

              exit $test_exit
            '

      - name: Validate Conan recipe
        run: |
          sudo docker run --rm \
            --network host \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            fastestapi-base bash -c '
              set -e
              pip3 install --quiet conan
              conan profile detect --force
              conan create . --version=0.1.0 --build=missing
            '

      - name: Add permissions
        if: always()
        run: sudo chown -R $(id -u):$(id -g) . 2>/dev/null || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test-results.xml

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: example-linux-x64
          path: build/example

      - name: Login to GHCR
        if: github.event_name == 'push'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build runtime image
        if: github.event_name == 'push'
        run: |
          sudo docker build -t "${{ env.IMAGE }}:${{ github.sha }}" .

      - name: Push runtime image
        if: github.event_name == 'push'
        run: |
          sudo docker push "${{ env.IMAGE }}:${{ github.sha }}"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${{ github.ref_name }}"
            sudo docker tag "${{ env.IMAGE }}:${{ github.sha }}" "${{ env.IMAGE }}:${TAG}"
            sudo docker tag "${{ env.IMAGE }}:${{ github.sha }}" "${{ env.IMAGE }}:latest"
            sudo docker push "${{ env.IMAGE }}:${TAG}"
            sudo docker push "${{ env.IMAGE }}:latest"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            sudo docker tag "${{ env.IMAGE }}:${{ github.sha }}" "${{ env.IMAGE }}:edge"
            sudo docker push "${{ env.IMAGE }}:edge"
          fi

      - name: Clean
        if: always()
        run: |
          sudo docker rm -f ci-redis > /dev/null 2>&1 || true
          sudo docker image rm -f fastestapi-base > /dev/null 2>&1 || true
          sudo docker logout ghcr.io > /dev/null 2>&1 || true
          rm -rf build fastestapi.db test.db
