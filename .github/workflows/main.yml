name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: [self-hosted, linux]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build base image
        run: sudo docker build --target base -t fastestapi-base .

      - name: Start Redis
        run: |
          sudo docker rm -f ci-redis 2>/dev/null || true
          sudo docker run -d --name ci-redis --network host redis:7
          sleep 2
          sudo docker exec ci-redis redis-cli ping

      - name: Build and test
        run: |
          sudo docker run --rm \
            --network host \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            fastestapi-base bash -c '
              set -e

              apt-get update && apt-get install -y --no-install-recommends curl python3

              cmake -B build -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_TESTS=ON
              cmake --build build --parallel

              chmod +x tests/integration_test.sh
              bash tests/integration_test.sh ./build/example

              ./build/example &
              SERVER_PID=$!
              sleep 2

              test_exit=0
              ./build/tests/unit_tests --gtest_output=xml:build/test-results.xml || test_exit=$?

              kill $SERVER_PID 2>/dev/null || true
              wait $SERVER_PID 2>/dev/null || true
              rm -f fastestapi.db

              exit $test_exit
            '

      - name: Fix permissions
        if: always()
        run: sudo chown -R $(id -u):$(id -g) . 2>/dev/null || true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/test-results.xml

      - name: Clean
        if: always()
        run: |
          sudo docker rm -f ci-redis 2>/dev/null || true
          sudo docker image rm -f fastestapi-base 2>/dev/null || true
          rm -rf build fastestapi.db test.db
